# OmniVoice TTS — nginx reverse proxy
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/omnivoice
#   sudo ln -sf /etc/nginx/sites-available/omnivoice /etc/nginx/sites-enabled/
#   # Edit server_name and paths below, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Start the app (listens on 127.0.0.1:8000 by default):
#   python server.py

upstream omnivoice_tts {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 164.52.194.184;

    # Voice profile uploads (reference audio)
    client_max_body_size 64m;

    # Web demo static UI (optional — remove if you serve the UI elsewhere)
    location /demo/ {
        # ← set to your clone path, e.g. /opt/kupe-tts/web_demo/
        alias /path/to/kupe-tts/web_demo/;
        try_files $uri $uri/ =404;
    }
    location = /demo {
        return 301 /demo/;
    }

    # WebSocket streaming TTS
    location /ws/ {
        proxy_pass http://omnivoice_tts;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # REST API + health
    location / {
        proxy_pass http://omnivoice_tts;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# TLS example (uncomment and configure cert paths):
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name your.domain.example;
